<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Simple dynamic programming tree</title>
  <desc id="desc">A minimal decision tree showing that the current decision depends on future payoffs.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      text {
        font-family: "Helvetica Neue", Arial, sans-serif;
        fill: #0f172a;
      }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 24px; }
      .small { font-size: 20px; fill: #475569; }
      .edge { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .decision { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .future { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .payoff { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>

  <text x="640" y="70" text-anchor="middle" class="title">Current choice depends on future choices</text>

  <rect x="110" y="290" width="220" height="120" rx="18" class="decision"/>
  <text x="220" y="345" text-anchor="middle" class="label">Choose now</text>
  <text x="220" y="378" text-anchor="middle" class="small">x₀</text>

  <rect x="500" y="180" width="220" height="110" rx="18" class="future"/>
  <text x="610" y="230" text-anchor="middle" class="label">Future node</text>
  <text x="610" y="262" text-anchor="middle" class="small">best later choice</text>

  <rect x="500" y="430" width="220" height="110" rx="18" class="future"/>
  <text x="610" y="480" text-anchor="middle" class="label">Future node</text>
  <text x="610" y="512" text-anchor="middle" class="small">best later choice</text>

  <rect x="910" y="160" width="220" height="70" rx="16" class="payoff"/>
  <text x="1020" y="205" text-anchor="middle" class="label">Value = 8</text>

  <rect x="910" y="270" width="220" height="70" rx="16" class="payoff"/>
  <text x="1020" y="315" text-anchor="middle" class="label">Value = 3</text>

  <rect x="910" y="410" width="220" height="70" rx="16" class="payoff"/>
  <text x="1020" y="455" text-anchor="middle" class="label">Value = 6</text>

  <rect x="910" y="520" width="220" height="70" rx="16" class="payoff"/>
  <text x="1020" y="565" text-anchor="middle" class="label">Value = 1</text>

  <path d="M 330 325 C 390 285, 440 245, 500 235" class="edge"/>
  <path d="M 330 375 C 390 415, 440 455, 500 485" class="edge"/>
  <text x="410" y="280" text-anchor="middle" class="small">choice A</text>
  <text x="410" y="455" text-anchor="middle" class="small">choice B</text>

  <path d="M 720 220 C 790 205, 835 200, 910 195" class="edge"/>
  <path d="M 720 245 C 790 260, 835 285, 910 305" class="edge"/>
  <path d="M 720 470 C 790 450, 835 445, 910 445" class="edge"/>
  <path d="M 720 495 C 790 520, 835 535, 910 555" class="edge"/>

  <text x="802" y="182" text-anchor="middle" class="small">later choice</text>
  <text x="805" y="290" text-anchor="middle" class="small">later choice</text>
  <text x="805" y="425" text-anchor="middle" class="small">later choice</text>
  <text x="805" y="548" text-anchor="middle" class="small">later choice</text>

  <path d="M 1070 625 C 925 655, 710 655, 555 610" fill="none" stroke="#dc2626" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="810" y="680" text-anchor="middle" class="label" fill="#b91c1c">Work backward: compare future values first</text>
</svg>